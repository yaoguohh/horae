<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0.12" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#5BAEFF"/>
      <stop offset="1" stop-color="#0A63EF"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#sheen)"/>

  <!-- 时辰/季节基点 -->
  <g stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.82">
    <line x1="256" y1="74"  x2="256" y2="92"/>
    <line x1="438" y1="256" x2="420" y2="256"/>
    <line x1="256" y1="438" x2="256" y2="420"/>
    <line x1="74"  y1="256" x2="92"  y2="256"/>
  </g>

  <!-- 循环刷新弧(与 app 同款 rotate-cw)，居中放大 -->
  <g transform="translate(256 256) scale(15.4)" fill="none" stroke="#ffffff"
     stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(-12 -12)">
      <path d="M21 12a9 9 0 1 1-3-6.7"/>
      <path d="M21 4v5h-5"/>
    </g>
  </g>
</svg>
